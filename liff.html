<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>購買表單 - LIFF</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 20px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-size: 20px; color: #333; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; line-height: 1.6; }
        .status { margin-top: 20px; padding: 12px; background: #f5f5f5; border-radius: 6px; font-size: 12px; color: #999; }
        .error { background: #ffebee; border: 1px solid #ef5350; border-radius: 6px; padding: 15px; margin-top: 20px; color: #d32f2f; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>📝 正在準備表單...</h1>
        <p>自動帶入您的 Line 資訊</p>
        <div class="status" id="status">初始化中...</div>
        <div id="message"></div>
    </div>

    <script>
        const CONFIG = {
            LIFF_ID: "2010020132-3XuX3I6b",
            GOOGLE_FORM_ID: "1FAIpQLSdwu3zElEvcn8BNsusREThOU3szOJj7ZEaDc4dSpr-xolauDw",
            FORM_FIELDS: {
                name: "entry.1661382921",
                gender: "entry.1834608958",
                ageGroup: "entry.318104399",
                email: "entry.703604523",
                phone: "entry.694565724",
                city: "entry.1506267035",
                isSeller: "entry.2112857716",
                note: "entry.2093061763"
            }
        };

        function updateStatus(msg) {
            const el = document.getElementById('status');
            if (el) el.textContent = msg;
            console.log(msg);
        }

        function showError(err) {
            document.querySelector('.spinner').style.display = 'none';
            const msg = document.getElementById('message');
            msg.innerHTML = `<div class="error"><strong>錯誤：${err}</strong><br>請確保從 Line App 內點擊連結。</div>`;
        }

        // 等待 LIFF SDK 加載
        function waitForLIFF(retries = 30) {
            return new Promise((resolve, reject) => {
                let count = 0;
                const check = () => {
                    if (typeof window.liff !== 'undefined') {
                        resolve();
                    } else if (count < retries) {
                        count++;
                        setTimeout(check, 200);
                    } else {
                        reject(new Error('LIFF SDK 無法加載'));
                    }
                };
                check();
            });
        }

        async function init() {
            try {
                updateStatus("等待 LIFF SDK...");
                // 先加載 SDK
                await new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = 'https://liff.line.me/sdk/web/liff.js';
                    script.onload = resolve;
                    script.onerror = reject;
                    document.body.appendChild(script);
                });

                updateStatus("等待初始化...");
                await waitForLIFF();

                updateStatus("初始化 LIFF...");
                await liff.init({ liffId: CONFIG.LIFF_ID });

                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                updateStatus("取得使用者資訊...");
                const profile = await liff.getProfile();
                
                updateStatus("準備導向表單...");
                const url = new URL(`https://docs.google.com/forms/d/e/${CONFIG.GOOGLE_FORM_ID}/viewform`);
                url.searchParams.append('usp', 'pp_url');
                url.searchParams.append(CONFIG.FORM_FIELDS.name, profile.displayName);

                setTimeout(() => { window.location.href = url.toString(); }, 1500);
            } catch (err) {
                console.error(err);
                showError(err.message);
            }
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
